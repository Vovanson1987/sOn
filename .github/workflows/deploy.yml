name: Deploy sOn Messenger

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # CI должен пройти перед деплоем
  ci:
    uses: ./.github/workflows/ci.yml

  deploy-production:
    name: Деплой на production VPS
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Деплой через SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd ~/sOn
            git fetch origin master
            git reset --hard origin/master
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
            echo "=== Waiting for containers ==="
            sleep 10
            docker ps --format 'table {{.Names}}\t{{.Status}}'
            echo "=== Health check ==="
            curl -sf http://localhost:8080/ > /dev/null && echo "✓ Web OK" || echo "✗ Web FAIL"
            curl -sf http://localhost:8080/api/health > /dev/null && echo "✓ API OK" || echo "✗ API FAIL"

      - name: Smoke-check production
        env:
          SMOKE_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
        run: |
          if [ -z "$SMOKE_BASE_URL" ]; then
            echo "⚠ PRODUCTION_BASE_URL не задан, пропускаем smoke-test"
            exit 0
          fi
          node scripts/smoke-web-server.mjs --base-url "$SMOKE_BASE_URL"
