name: Deploy sOn Messenger

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy-production:
    name: Деплой на production + smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Деплой через SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/son-messenger
            git pull origin master
            docker compose -f docker-compose.prod.yml up -d --build

      - name: Smoke-check production
        env:
          SMOKE_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
        run: |
          if [ -z "$SMOKE_BASE_URL" ]; then
            echo "Секрет PRODUCTION_BASE_URL не задан"
            exit 1
          fi
          node scripts/smoke-web-server.mjs --base-url "$SMOKE_BASE_URL"
