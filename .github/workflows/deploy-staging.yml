name: Deploy Staging

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Деплой на staging + smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Деплой staging через SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          port: ${{ secrets.STAGING_PORT || 22 }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/son-messenger
            git fetch origin dev
            git checkout dev
            git pull origin dev
            docker compose -f docker-compose.prod.yml up -d --build

      - name: Smoke-check staging
        env:
          SMOKE_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
        run: |
          if [ -z "$SMOKE_BASE_URL" ]; then
            echo "Секрет STAGING_BASE_URL не задан"
            exit 1
          fi
          node scripts/smoke-web-server.mjs --base-url "$SMOKE_BASE_URL"
