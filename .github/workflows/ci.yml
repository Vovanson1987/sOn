name: CI — sOn Messenger

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  lint-and-typecheck:
    name: Линтинг и проверка типов
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webApp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webApp/package-lock.json
      - run: npm ci
      - name: ESLint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0
      - name: TypeScript
        run: npx tsc --noEmit

  unit-tests:
    name: Unit-тесты (Vitest)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: webApp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webApp/package-lock.json
      - run: npm ci
      - name: Vitest с покрытием
        run: npx vitest run --coverage

  build:
    name: Сборка (Vite)
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: webApp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webApp/package-lock.json
      - run: npm ci
      - name: Сборка
        run: npm run build
      - name: Проверка размера бандла
        run: |
          SIZE=$(du -sk dist/assets/*.js | awk '{total += $1} END {print total}')
          echo "Размер JS бандла: ${SIZE}KB"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: webApp/dist/

  security:
    name: Безопасность
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webApp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webApp/package-lock.json
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high || true
