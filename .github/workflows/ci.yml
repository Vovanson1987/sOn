name: CI — sOn Messenger

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

jobs:
  # ==================== Frontend ====================

  lint-and-typecheck:
    name: Линтинг и проверка типов (Frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webApp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webApp/package-lock.json
      - run: npm ci
      - name: ESLint
        run: npx eslint src/
      - name: TypeScript
        run: npx tsc --noEmit

  frontend-tests:
    name: Unit-тесты Frontend (Vitest)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: webApp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webApp/package-lock.json
      - run: npm ci
      - name: Vitest с покрытием
        run: npx vitest run --coverage

  build:
    name: Сборка (Vite)
    runs-on: ubuntu-latest
    needs: frontend-tests
    defaults:
      run:
        working-directory: webApp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webApp/package-lock.json
      - run: npm ci
      - name: Сборка
        run: npm run build
      - name: Проверка размера бандла
        run: |
          SIZE=$(du -sk dist/assets/*.js | awk '{total += $1} END {print total}')
          echo "Размер JS бандла: ${SIZE}KB"
          if [ "$SIZE" -gt 2048 ]; then
            echo "Бандл превышает 2MB!"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: webApp/dist/

  # ==================== Backend ====================

  server-tests:
    name: Unit-тесты Backend (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Jest тесты
        run: npm test
        env:
          NODE_ENV: test

  # ==================== Security ====================

  security:
    name: Безопасность
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [webApp, server]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high || true
