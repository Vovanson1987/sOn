## docker-compose.prod.yml — полный стек sOn Messenger
## Запуск: docker compose -f docker-compose.prod.yml up -d --build
## Доступ: http://localhost (или http://IP-адрес)

services:

  # ====== База данных ======
  postgres:
    image: postgres:16-alpine
    container_name: son-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-son_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-son}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - son-internal

  # ====== Кэш ======
  redis:
    image: redis:7-alpine
    container_name: son-redis
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192m
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - son-internal

  # ====== Файловое хранилище ======
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: son-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - son-internal

  # ====== API сервер ======
  api:
    build: ./server
    container_name: son-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PORT: "4000"
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:?required}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-son_prod}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set (min 32 chars)}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?required}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - son-internal

  # ====== Frontend (nginx + SPA) ======
  web:
    build:
      context: ./webApp
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
    container_name: son-web
    restart: always
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - son-internal

  # ====== TURN сервер ======
  coturn:
    image: coturn/coturn:4.6
    container_name: son-coturn
    restart: always
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  son-internal:
    driver: bridge
